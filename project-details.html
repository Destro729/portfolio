<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details | Archive of Logic</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --text-secondary: #a1a1a6;
            --accent: #0071e3;
            --border: rgba(255, 255, 255, 0.1);
            --card: rgba(255, 255, 255, 0.05);
            --font-hd: 'Unbounded', sans-serif;
            --font-main: 'Inter', sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-theme {
            --bg: #f5f5f7;
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --card: rgba(0, 0, 0, 0.05);
            --border: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: var(--font-main); 
            padding-top: 100px;
            transition: background 0.5s; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 8%;
            background: var(--bg);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .back-link { 
            color: var(--text); 
            text-decoration: none; 
            font-weight: 800; 
            font-family: var(--font-hd); 
            font-size: 0.8rem;
            display: flex; 
            align-items: center; 
            gap: 10px;
            transition: var(--transition);
            text-transform: uppercase;
        }
        .back-link:hover { color: var(--accent); transform: translateX(-5px); }

        .nav-controls { 
            display: flex; 
            gap: 15px; 
            align-items: center; 
        }

        .control-btn { 
            background: none; 
            border: 1px solid var(--border); 
            color: var(--text); 
            padding: 8px 15px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-family: var(--font-hd); 
            font-size: 0.6rem; 
            transition: 0.3s;
        }
        .control-btn:hover { background: var(--text); color: var(--bg); }
        .control-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        .project-container { max-width: 1200px; margin: 0 auto; padding: 40px 8% 0; }

        .project-meta { 
            color: var(--accent); 
            font-family: var(--font-hd); 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        h1 { 
            font-family: var(--font-hd); 
            font-size: clamp(2rem, 6vw, 4.5rem); 
            line-height: 1.1; 
            text-transform: uppercase; 
            margin-bottom: 60px; 
        }

        .hero-img-box {
            width: 100%;
            height: 600px; /* Фіксована висота для стабільності */
            border-radius: 40px;
            margin-bottom: 80px;
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-img { 
            width: 100%; 
            height: 100%;
            display: block;
            object-fit: cover;
            transform: scale(1.2); /* Твоє прохання про 1.2 */
            transition: var(--transition);
        }

        .project-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 80px; }

        .sidebar h3 { 
            font-size: 0.65rem; 
            text-transform: uppercase; 
            color: var(--text-secondary); 
            margin-bottom: 15px; 
            font-family: var(--font-hd);
            letter-spacing: 1px;
        }

        .sidebar .info-block { margin-bottom: 45px; }
        .sidebar p, .sidebar a { font-weight: 600; font-size: 1.1rem; color: var(--text); text-decoration: none; }
        
        .tech-tag {
            display: inline-block;
            padding: 5px 15px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 50px;
            font-size: 0.8rem !important;
            margin-right: 5px;
            margin-bottom: 5px;
            transition: 0.3s;
            cursor: pointer;
            color: var(--text);
            text-transform: uppercase;
        }
        .tech-tag:hover { border-color: var(--accent); color: var(--accent) !important; }

        .main-content { 
            font-size: 1.15rem; 
            line-height: 1.8; 
            color: var(--text-secondary); 
            white-space: pre-wrap; 
        }

        .gallery { margin-top: 100px; display: grid; gap: 40px; }
        .gallery img { width: 100%; border-radius: 30px; border: 1px solid var(--border); }

        .cooperation-banner {
            max-width: 1200px;
            margin: 150px auto 0;
            padding: 80px 8%;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 60px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .cooperation-banner p {
            font-family: var(--font-main);
            font-size: clamp(1.1rem, 2vw, 1.4rem);
            line-height: 1.6;
            color: var(--text-secondary);
            max-width: 850px;
            margin: 0 auto;
            font-weight: 400;
        }

        .cooperation-banner b {
            color: var(--accent);
            font-weight: 800;
            text-transform: uppercase;
            font-family: var(--font-hd);
            font-size: 0.9em;
        }
        
        .cooperation-banner .brief-trigger {
            display: inline-block;
            margin-top: 10px;
            color: var(--accent);
            text-decoration: none;
            cursor: pointer;
            transition: var(--transition);
            border-bottom: 2px solid transparent;
        }
        .cooperation-banner .brief-trigger:hover {
            border-bottom-color: var(--accent);
        }

        footer {
            padding: 100px 8%;
            border-top: 1px solid var(--border);
            margin-top: 100px;
            background: var(--bg);
        }

        .footer-grid {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 60px;
        }

        .footer-left {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .footer-contacts {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .footer-contacts a {
            font-family: var(--font-hd);
            font-size: clamp(1.5rem, 4vw, 3rem); /* Більш величний розмір */
            color: var(--text);
            text-decoration: none;
            font-weight: 900;
            transition: var(--transition);
            line-height: 1;
        }

        .footer-contacts a:hover {
            color: var(--accent);
            padding-left: 20px;
        }

        .social-links {
            display: flex;
            gap: 20px;
        }

        .social-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            text-decoration: none;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: var(--card);
            font-size: 1.2rem;
        }

        .social-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            transform: scale(1.1) rotate(5deg);
        }

        .footer-right { text-align: right; }
        .footer-brand {
            font-family: var(--font-hd);
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: -1px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .footer-status {
            color: var(--accent);
            font-family: var(--font-hd);
            font-size: 0.8rem;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        @media (max-width: 900px) {
            .project-grid { grid-template-columns: 1fr; gap: 40px; }
            header { padding: 20px 5%; }
            .hero-img-box { height: 400px; }
            .footer-grid { flex-direction: column; text-align: left; }
            .footer-right { text-align: left; }
            .footer-contacts a { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-left">
            <a href="all-projects.html" class="back-link">
                <i class="fa-solid fa-arrow-left"></i> 
                <span class="lang-en">BACK TO ARCHIVE</span>
                <span class="lang-ua" style="display:none;">ДО АРХІВУ</span>
            </a>
        </div>
        <div class="nav-controls">
            <button class="control-btn" onclick="toggleTheme()">
                <i class="fa-solid fa-circle-half-stroke"></i>
            </button>
            <button class="control-btn" onclick="setLang('ua')" id="btn-ua">UA</button>
            <button class="control-btn" onclick="setLang('en')" id="btn-en">EN</button>
        </div>
    </header>

    <main class="project-container" id="project-render"></main>

    <section class="cooperation-banner">
        <p class="lang-ua">Цікавить співпраця зі мною? <span class="brief-trigger" onclick="openBriefPopup()"><b>ЗАПОВНЮЙ ТА ВІДПРАВЛЯЙ БРИФ</b></span> або подзвони/напиши мені.</p>
        <p class="lang-en" style="display:none;">Interested in working together? <span class="brief-trigger" onclick="openBriefPopup()"><b>FILL OUT THE BRIEF</b></span> or call/write to me.</p>
    </section>

    <footer>
        <div class="footer-grid">
            <div class="footer-left">
                <div class="footer-contacts">
                    <a href="tel:+380932097079" id="f-phone-link">+380 93 209 70 79</a>
                    <a href="mailto:Destro729@gmail.com" id="f-email-link">Destro729@gmail.com</a>
                </div>
                <div class="social-links" id="f-socials"></div>
            </div>
            
            <div class="footer-right">
                <div class="footer-brand">MAKSYM RIZUN</div>
                <div class="footer-status" id="f-role"></div>
                <div style="color: var(--text-secondary); opacity: 0.4; font-size: 0.7rem; font-family: var(--font-hd); margin-top: 20px;">
                    © 2026 ANOR CORE / ARCHIVE OF LOGIC
                </div>
            </div>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://anor-core-2026-default-rtdb.europe-west1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');
        let currentLang = localStorage.getItem('anor_lang') || 'ua';

        window.toggleTheme = () => {
            const isLight = document.body.classList.toggle('light-theme');
            localStorage.setItem('anor_theme', isLight ? 'light' : 'dark');
        };
        if(localStorage.getItem('anor_theme') === 'light') document.body.classList.add('light-theme');

        window.setLang = (lang) => {
            currentLang = lang;
            localStorage.setItem('anor_lang', lang);
            updateUI();
            if(window.lastData) renderProject(window.lastData);
        };

        function updateUI() {
            document.querySelectorAll('.nav-controls .control-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById('btn-' + currentLang);
            if(activeBtn) activeBtn.classList.add('active');
            
            document.querySelectorAll('.lang-en').forEach(el => el.style.display = currentLang === 'en' ? 'inline-block' : 'none');
            document.querySelectorAll('.lang-ua').forEach(el => el.style.display = currentLang === 'ua' ? 'inline-block' : 'none');
            
            if(window.lastFooter) {
                document.getElementById('f-role').innerText = currentLang === 'ua' ? window.lastFooter.roleUa : window.lastFooter.roleEn;
            }
        }

        function renderProject(data) {
            window.lastData = data;
            const container = document.getElementById('project-render');
            
            const title = currentLang === 'ua' ? (data.titleUa || data.title) : (data.titleEn || data.title);
            const desc = currentLang === 'ua' ? (data.descUa || data.desc || data.description) : (data.descEn || data.desc || data.description);
            
            // Виправлено: підтягуємо мета-тег з бази (наприклад "АНІМЕ | 2026")
            const meta = data.customMeta || (currentLang === 'ua' ? 'СПЕКТРАЛЬНИЙ АРТЕФАКТ' : 'SPECTRAL ARTIFACT');
            
            let catsArray = [];
            if (data.category) {
                if (Array.isArray(data.category)) {
                    catsArray = data.category.map(c => (typeof c === 'object' && c.name) ? c.name : c);
                } else if (typeof data.category === 'object' && data.category.name) {
                    catsArray = [data.category.name];
                } else if (typeof data.category === 'string') {
                    catsArray = data.category.split(',').map(c => c.trim()).filter(c => c !== "");
                }
            }
            if (catsArray.length === 0) catsArray = ["LOGIC"];

            container.innerHTML = `
                <div class="project-meta">${meta} / ${catsArray.join(' / ')}</div>
                <h1>${title}</h1>
                <div class="hero-img-box">
                    <img src="${data.mainImage || data.image}" class="hero-img" alt="${title}">
                </div>
                
                <div class="project-grid">
                    <div class="sidebar">
                        <div class="info-block">
                            <h3>${currentLang === 'ua' ? 'СИСТЕМА ТА РІК' : 'SYSTEM & YEAR'}</h3>
                            <p>2026 / ANOR CORE v3.8</p>
                        </div>
                        
                        <div class="info-block">
                            <h3>${currentLang === 'ua' ? 'ТЕХНОЛОГІЇ ТА КАТЕГОРІЇ' : 'TECHNOLOGIES & CATEGORIES'}</h3>
                            <div style="margin-top: 10px;">
                                ${catsArray.map(cat => `
                                    <span class="tech-tag" onclick="location.href='all-projects.html?filter=${encodeURIComponent(cat)}'">
                                        ${cat}
                                    </span>
                                `).join('')}
                            </div>
                        </div>

                        ${data.githubLink || data.link ? `
                        <div class="info-block">
                            <h3>${currentLang === 'ua' ? 'РЕСУРСИ' : 'RESOURCES'}</h3>
                            <a href="${data.githubLink || data.link}" target="_blank" style="color: var(--accent); display: flex; align-items: center; gap: 8px;">
                                <span>${currentLang === 'ua' ? 'Відкрити Артефакт' : 'Open Artifact'}</span>
                                <i class="fa-solid fa-arrow-up-right-from-square" style="font-size: 0.8rem;"></i>
                            </a>
                        </div>` : ''}
                    </div>

                    <div class="main-content">${desc}</div>
                </div>

                ${data.gallery ? `
                <div class="gallery">
                    ${Object.values(data.gallery).map(img => `<img src="${img}" loading="lazy">`).join('')}
                </div>` : ''}
            `;
        }

        if (projectId) {
            onValue(ref(db, `projects/${projectId}`), (snap) => {
                const data = snap.val();
                if (data) renderProject(data);
                else document.getElementById('project-render').innerHTML = "<h1>Artifact lost in space...</h1>";
            });
        }

        onValue(ref(db, 'settings/footer'), (snapshot) => {
            const f = snapshot.val();
            if(!f) return;
            window.lastFooter = f;
            
            document.getElementById('f-phone-link').innerText = f.phone;
            document.getElementById('f-phone-link').href = `tel:${f.phone.replace(/\s/g, '')}`;
            document.getElementById('f-email-link').innerText = f.email;
            document.getElementById('f-email-link').href = `mailto:${f.email}`;
            
            const soc = document.getElementById('f-socials');
            soc.innerHTML = `
                <a href="${f.wa || '#'}" target="_blank" class="social-btn" title="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>
                <a href="${f.tg || '#'}" target="_blank" class="social-btn" title="Telegram"><i class="fa-brands fa-telegram"></i></a>
                <a href="${f.gh || '#'}" target="_blank" class="social-btn" title="GitHub"><i class="fa-brands fa-github"></i></a>
            `;
            updateUI();
        });

        // Виклик форми брифу (передбачається наявність глобальної функції або виклик через postMessage на головну)
        window.openBriefPopup = () => {
            // Оскільки ми на окремій сторінці, найкращий спосіб - редирект з параметром або виклик модалки, якщо вона є
            // Якщо модалка завантажена в цю сторінку (потрібно додати її код), інакше:
            if(window.parent && window.parent.openBriefModal) {
                 window.parent.openBriefModal();
            } else {
                 alert(currentLang === 'ua' ? "Відкриваю форму брифу..." : "Opening brief form...");
                 // Тут можна додати логіку завантаження модалки брифу безпосередньо в DOM сторінки
            }
        }

        updateUI();
    </script>
</body>
</html>
