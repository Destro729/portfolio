<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details | Archive of Logic</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --text-secondary: #a1a1a6;
            --accent: #0071e3;
            --accent-hover: #005bbd;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --font-hd: 'Unbounded', sans-serif;
            --font-main: 'Inter', sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-theme {
            --bg: #f5f5f7;
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --card: rgba(0, 0, 0, 0.05);
            --border: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: var(--font-main); 
            padding: 120px 8% 0 8%;
            transition: background 0.5s; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- SYNCED HEADER (FROM ALL-PROJECTS) --- */
        .nav-header {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 20px 8%; background: var(--bg);
            backdrop-filter: blur(20px); z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .nav-controls { display: flex; gap: 20px; align-items: center; }

        .back-link { 
            color: var(--text); text-decoration: none; font-weight: 800; 
            font-family: var(--font-hd); font-size: 0.8rem;
            display: flex; align-items: center; gap: 10px;
            transition: var(--transition);
            text-transform: uppercase;
        }
        .back-link:hover { color: var(--accent); transform: translateX(-5px); }

        .control-btn { 
            background: none; border: 1px solid var(--border); color: var(--text); 
            padding: 8px 15px; border-radius: 50px; cursor: pointer; 
            font-family: var(--font-hd); font-size: 0.6rem; transition: 0.3s;
            min-width: 40px;
        }
        .control-btn:hover { background: var(--text); color: var(--bg); }

        /* --- PROJECT CONTENT --- */
        .project-container { max-width: 1400px; margin: 0 auto; width: 100%; flex-grow: 1; }

        .project-meta { 
            color: var(--accent); 
            font-family: var(--font-hd); 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        h1 { 
            font-family: var(--font-hd); 
            font-size: clamp(2.5rem, 8vw, 5rem); 
            line-height: 1.1; 
            text-transform: uppercase; 
            margin-bottom: 60px; 
        }

        /* ВИПРАВЛЕНО: Збільшено на 20% (scale 1.2) та додано контейнер для збереження відступів */
        .hero-img-wrapper {
            width: 100%;
            overflow: hidden;
            border-radius: 40px;
            margin-bottom: 100px;
            border: 1px solid var(--border);
        }
        .hero-img { 
            width: 100%; 
            display: block;
            object-fit: cover;
            transform: scale(1.2);
            transition: var(--transition);
        }

        .project-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 80px; }

        .sidebar h3 { 
            font-size: 0.65rem; 
            text-transform: uppercase; 
            color: var(--text-secondary); 
            margin-bottom: 15px; 
            font-family: var(--font-hd);
            letter-spacing: 1px;
        }

        .sidebar .info-block { margin-bottom: 45px; }
        .sidebar p, .sidebar a { font-weight: 600; font-size: 1.1rem; color: var(--text); text-decoration: none; }
        
        .tech-tag {
            display: inline-block;
            padding: 5px 15px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 50px;
            font-size: 0.8rem !important;
            margin-right: 5px;
            margin-bottom: 5px;
            transition: 0.3s;
            cursor: pointer;
        }
        .tech-tag:hover { border-color: var(--accent); color: var(--accent) !important; }

        .main-content { 
            font-size: 1.15rem; 
            line-height: 1.8; 
            color: var(--text-secondary); 
            white-space: pre-wrap; 
        }

        .gallery { margin-top: 100px; display: grid; gap: 40px; }
        .gallery img { width: 100%; border-radius: 30px; border: 1px solid var(--border); }

        /* --- SYNCED FOOTER (FROM ALL-PROJECTS) --- */
        footer { padding: 100px 8%; border-top: 1px solid var(--border); margin-top: 100px; margin-left: -8.7%; margin-right: -8.7%; background: var(--bg); }
        .footer-grid { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 40px; }
        .footer-contacts { display: flex; flex-direction: column; gap: 10px; }
        .footer-contacts a { font-family: var(--font-hd); font-size: clamp(1.2rem, 3vw, 2rem); color: var(--text); text-decoration: none; font-weight: 900; transition: var(--transition); }
        .footer-contacts a:hover { color: var(--accent); }
        .footer-email { color: var(--text-secondary); text-decoration: none; font-weight: 600; font-size: 1.1rem; }
        
        .social-icons { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
        .social-icons a { width: 50px; height: 50px; background: var(--card); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; color: var(--text); border: 1px solid var(--border); transition: 0.3s; text-decoration: none; }
        .social-icons a:hover { background: var(--accent); color: #fff; transform: translateY(-5px); border-color: var(--accent); }

        @media (max-width: 900px) {
            .project-grid { grid-template-columns: 1fr; gap: 40px; }
            .nav-header { padding: 20px 5%; }
            .footer-grid { flex-direction: column; text-align: center; align-items: center; }
            .footer-grid div { text-align: center !important; }
            .social-icons { justify-content: center; }
            .hero-img { transform: scale(1.1); } /* Трохи менше збільшення для мобільних */
        }
    </style>
</head>
<body data-theme="dark">

    <header class="nav-header">
        <a href="all-projects.html" class="back-link">
            <i class="fa-solid fa-arrow-left"></i> 
            <span class="lang-en">BACK TO ARCHIVE</span>
            <span class="lang-ua" style="display:none;">ДО АРХІВУ</span>
        </a>
        <div class="nav-controls">
            <button class="control-btn" onclick="toggleTheme()"><i class="fa-solid fa-circle-half-stroke"></i></button>
            <button class="control-btn" onclick="toggleLang()" style="min-width: 80px;">UA / EN</button>
        </div>
    </header>

    <main class="project-container" id="project-render">
        </main>

    <footer id="footer">
        <div class="footer-grid">
            <div class="footer-contacts">
                <a href="tel:+380932097079" id="f-phone-link">+380 93 209 70 79</a>
                <a href="mailto:Destro729@gmail.com" class="footer-email" id="f-email-link">Destro729@gmail.com</a>
                <div class="social-icons" id="f-socials">
                    <a href="#" target="_blank" title="WhatsApp" id="f-wa"><i class="fa-brands fa-whatsapp"></i></a>
                    <a href="#" target="_blank" title="Telegram" id="f-tg"><i class="fa-brands fa-telegram"></i></a>
                    <a href="#" target="_blank" title="GitHub" id="f-gh"><i class="fa-brands fa-github"></i></a>
                    <a href="#" title="Discord" id="f-ds"><i class="fa-brands fa-discord"></i></a>
                    <a href="#" title="Behance" id="f-bh"><i class="fa-brands fa-behance"></i></a>
                    <a href="#" title="Fiverr" id="f-fv"><i class="fa-solid fa-f"></i></a>
                </div>
            </div>
            <div style="text-align: right;">
                <p style="font-weight: 800; color: var(--text); font-family: var(--font-hd); text-transform: uppercase;">MAKSYM RIZUN</p>
                <p style="color: var(--text-secondary); margin-top: 5px;" class="lang-en" id="f-role-en">Designer & AI Engineer 2026</p>
                <p style="color: var(--text-secondary); margin-top: 5px; display:none;" class="lang-ua" id="f-role-ua">Дизайнер та AI Інженер 2026</p>
                <p style="color: var(--text-secondary); opacity: 0.5; font-size: 0.8rem; margin-top: 15px;" class="lang-en">&copy; All Rights Reserved.</p>
                <p style="color: var(--text-secondary); opacity: 0.5; font-size: 0.8rem; margin-top: 15px; display:none;" class="lang-ua">&copy; Всі права захищено.</p>
            </div>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://anor-core-2026-default-rtdb.europe-west1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');
        let currentLang = localStorage.getItem('anor_lang') || 'en';

        // --- THEME ENGINE ---
        window.toggleTheme = () => {
            const isLight = document.body.classList.toggle('light-theme');
            localStorage.setItem('anor_theme', isLight ? 'light' : 'dark');
        };
        if(localStorage.getItem('anor_theme') === 'light') document.body.classList.add('light-theme');

        // --- LANGUAGE ENGINE ---
        window.toggleLang = () => {
            currentLang = currentLang === 'en' ? 'ua' : 'en';
            localStorage.setItem('anor_lang', currentLang);
            updateUI();
        };

        function updateUI() {
            const ens = document.querySelectorAll('.lang-en');
            const uas = document.querySelectorAll('.lang-ua');
            
            ens.forEach(el => el.style.display = currentLang === 'en' ? 'block' : 'none');
            uas.forEach(el => el.style.display = currentLang === 'ua' ? 'block' : 'none');

            if(window.lastData) renderProject(window.lastData);
            
            // Sync footer role
            if(window.lastFooter) {
                const roleUa = document.getElementById('f-role-ua');
                const roleEn = document.getElementById('f-role-en');
                if(roleUa) roleUa.innerText = window.lastFooter.roleUa || '';
                if(roleEn) roleEn.innerText = window.lastFooter.roleEn || '';
            }
        }

        // --- RENDER PROJECT ---
        function renderProject(data) {
            window.lastData = data;
            const container = document.getElementById('project-render');
            
            const title = currentLang === 'ua' ? (data.titleUa || data.title) : (data.titleEn || data.title);
            const desc = currentLang === 'ua' ? (data.descUa || data.desc || data.description) : (data.descEn || data.desc || data.description);
            const meta = data.customMeta || 'SPECTRAL ARTIFACT';
            
            // Категорії можуть бути або рядком з комами, або просто значенням
            let categories = [];
            if (data.category) {
                if (typeof data.category === 'string') {
                    categories = data.category.split(',').map(c => c.trim());
                } else if (typeof data.category === 'object' && data.category.name) {
                    categories = [data.category.name];
                } else {
                    categories = [data.category];
                }
            } else {
                categories = ['LOGIC'];
            }

            container.innerHTML = `
                <div class="project-meta">${meta} / ${categories.join(' / ')}</div>
                <h1>${title}</h1>
                <div class="hero-img-wrapper">
                    <img src="${data.mainImage || data.image}" class="hero-img">
                </div>
                
                <div class="project-grid">
                    <div class="sidebar">
                        <div class="info-block">
                            <h3>${currentLang === 'ua' ? 'СИСТЕМА ТА РІК' : 'SYSTEM & YEAR'}</h3>
                            <p>2026 / ANOR CORE v3.8</p>
                        </div>
                        
                        <div class="info-block">
                            <h3>${currentLang === 'ua' ? 'ТЕХНОЛОГІЇ (КАТЕГОРІЇ)' : 'TECHNOLOGIES'}</h3>
                            <div>
                                ${categories.map(cat => `
                                    <span class="tech-tag" onclick="location.href='all-projects.html?filter=${encodeURIComponent(cat)}'">
                                        ${cat}
                                    </span>
                                `).join('')}
                            </div>
                        </div>

                        ${data.githubLink || data.link ? `
                        <div class="info-block">
                            <h3>${currentLang === 'ua' ? 'РЕСУРСИ' : 'RESOURCES'}</h3>
                            <a href="${data.githubLink || data.link}" target="_blank" style="color: var(--accent);">
                                ${currentLang === 'ua' ? 'Переглянути Artifact' : 'View Source Code'} ↗
                            </a>
                        </div>` : ''}
                    </div>

                    <div class="main-content">${desc}</div>
                </div>

                ${data.gallery ? `
                <div class="gallery">
                    ${Object.values(data.gallery).map(img => `<img src="${img}">`).join('')}
                </div>` : ''}
            `;
        }

        // --- LOAD PROJECT DATA ---
        if (projectId) {
            onValue(ref(db, `projects/${projectId}`), (snap) => {
                const data = snap.val();
                if (data) renderProject(data);
                else document.getElementById('project-render').innerHTML = "<h1>Artifact lost in space...</h1>";
            });
        }

        // --- SYNC FOOTER FROM DATABASE ---
        onValue(ref(db, 'settings/footer'), (snapshot) => {
            const f = snapshot.val();
            if(!f) return;
            window.lastFooter = f;
            
            const phoneEl = document.getElementById('f-phone-link');
            const emailEl = document.getElementById('f-email-link');
            
            if (f.phone) {
                phoneEl.innerText = f.phone;
                phoneEl.href = `tel:${f.phone.replace(/\s/g, '')}`;
            }
            if (f.email) {
                emailEl.innerText = f.email;
                emailEl.href = `mailto:${f.email}`;
            }
            
            if (f.roleUa) document.getElementById('f-role-ua').innerText = f.roleUa;
            if (f.roleEn) document.getElementById('f-role-en').innerText = f.roleEn;
            
            if (f.tg) document.getElementById('f-tg').href = f.tg;
            if (f.wa) document.getElementById('f-wa').href = f.wa;
            if (f.gh) document.getElementById('f-gh').href = f.gh;
            if (f.ds) document.getElementById('f-ds').href = f.ds;
            if (f.bh) document.getElementById('f-bh').href = f.bh;
            if (f.fv) document.getElementById('f-fv').href = f.fv;
            
            updateUI();
        });
    </script>
</body>
</html>
