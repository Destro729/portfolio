<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details | Anor Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --text-secondary: #a1a1a6;
            --accent: #0071e3;
            --border: rgba(255, 255, 255, 0.08);
            --card: #121212;
            --font-hd: 'Unbounded', sans-serif;
        }

        body.light-theme {
            --bg: #f5f5f7;
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --border: rgba(0, 0, 0, 0.1);
            --card: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.3s ease, color 0.3s ease; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
        }

        /* HEADER */
        header {
            padding: 30px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: var(--font-hd);
            font-size: 1rem;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: 2px;
        }

        .header-controls { display: flex; gap: 20px; align-items: center; }
        
        .control-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-family: var(--font-hd);
            font-size: 0.6rem;
        }

        .control-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

        /* CONTENT WRAPPER */
        .wrapper { max-width: 1200px; margin: 0 auto; padding: 150px 40px 100px; }

        .back-btn { 
            color: var(--text-secondary); 
            text-decoration: none; 
            font-size: 0.75rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 50px; 
            transition: 0.3s; 
        }

        .back-btn:hover { color: var(--accent); transform: translateX(-5px); }

        .meta-tags { 
            color: var(--accent); 
            font-family: var(--font-hd); 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            margin-bottom: 20px; 
        }

        h1 { 
            font-family: var(--font-hd); 
            font-size: clamp(2rem, 6vw, 4rem); 
            line-height: 1.1; 
            text-transform: uppercase; 
            margin-bottom: 60px; 
        }

        .main-img { 
            width: 100%; 
            border-radius: 40px; 
            margin-bottom: 80px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }

        .details-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 80px; }

        .sidebar-info h3 { 
            font-size: 0.65rem; 
            text-transform: uppercase; 
            color: var(--text-secondary); 
            margin-bottom: 15px; 
            font-family: var(--font-hd);
            letter-spacing: 1px;
        }

        .sidebar-info p { font-weight: 600; margin-bottom: 40px; font-size: 1.1rem; }
        
        .sidebar-info a { color: var(--text); text-decoration: none; border-bottom: 1px solid var(--accent); }

        .content-body { 
            font-size: 1.2rem; 
            line-height: 1.8; 
            color: var(--text); 
            white-space: pre-wrap; 
        }

        /* FOOTER */
        footer {
            padding: 100px 5% 50px;
            border-top: 1px solid var(--border);
            margin-top: 100px;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 50px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-logo { font-family: var(--font-hd); font-size: 1.5rem; margin-bottom: 20px; }
        
        .footer-contacts p { color: var(--text-secondary); margin-bottom: 10px; }

        .social-links { display: flex; gap: 20px; margin-top: 30px; }
        .social-links a { color: var(--text); font-size: 1.2rem; transition: 0.3s; }
        .social-links a:hover { color: var(--accent); }

        .loader-wrap {
            height: 50vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-hd);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        @media (max-width: 900px) {
            .details-grid { grid-template-columns: 1fr; gap: 40px; }
            .wrapper { padding: 120px 20px 60px; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body class="dark-theme">

    <header>
        <a href="index.html" class="logo">ANOR CORE</a>
        <div class="header-controls">
            <div style="display: flex; gap: 5px; border-right: 1px solid var(--border); padding-right: 15px;">
                <button class="control-btn" id="lang-ua" onclick="changeLang('ua')">UA</button>
                <button class="control-btn" id="lang-en" onclick="changeLang('en')">EN</button>
            </div>
            <button class="control-btn" id="theme-toggle" onclick="toggleTheme()">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </header>

    <div class="wrapper" id="project-container">
        <div class="loader-wrap">Gathering data from Spectral...</div>
    </div>

    <footer id="global-footer">
        <div class="footer-grid">
            <div>
                <div class="footer-logo">ANOR</div>
                <p id="f-role" style="color: var(--text-secondary)"></p>
            </div>
            <div class="footer-contacts">
                <h3>Contact</h3>
                <p id="f-email"></p>
                <p id="f-phone"></p>
            </div>
            <div>
                <h3>Social</h3>
                <div class="social-links" id="f-socials">
                    </div>
            </div>
        </div>
        <div style="text-align: center; margin-top: 80px; font-size: 0.7rem; color: var(--text-secondary); opacity: 0.5;">
            &copy; 2026 ANOR CORE SYSTEM. ALL RIGHTS RESERVED.
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://anor-core-2026-default-rtdb.europe-west1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        let currentLang = localStorage.getItem('anor_lang') || 'ua';

        // --- THEME LOGIC ---
        window.toggleTheme = () => {
            const isLight = document.body.classList.toggle('light-theme');
            localStorage.setItem('anor_theme', isLight ? 'light' : 'dark');
            document.getElementById('theme-toggle').innerHTML = isLight ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
        };

        // Init theme
        if(localStorage.getItem('anor_theme') === 'light') {
            document.body.classList.add('light-theme');
            document.getElementById('theme-toggle').innerHTML = '<i class="fa-solid fa-sun"></i>';
        }

        // --- LANG LOGIC ---
        window.changeLang = (lang) => {
            currentLang = lang;
            localStorage.setItem('anor_lang', lang);
            updateLangUI();
            location.reload(); // Перезавантаження для ШІ-перекладу (або виклику функції перекладу)
        };

        function updateLangUI() {
            document.querySelectorAll('.header-controls .control-btn').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById('lang-' + currentLang);
            if(btn) btn.classList.add('active');
        }

        // --- LOAD DATA ---
        if (id) {
            onValue(ref(db, `projects/${id}`), (snap) => {
                const data = snap.val();
                if (data) {
                    document.title = `${data.title} | Anor Core`;
                    
                    // Обробка категорій (перевірка на масив/рядок)
                    const cats = Array.isArray(data.categories) ? data.categories.join(', ') : (data.category || 'GENERAL');
                    
                    document.getElementById('project-container').innerHTML = `
                        <a href="all-projects.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Archive</a>
                        
                        <div class="meta-tags">${data.customMeta || 'PROJECT'} / ${cats}</div>
                        
                        <h1 class="ai-translate">${data.title}</h1>
                        
                        <img src="${data.mainImage}" class="main-img" alt="Hero">
                        
                        <div class="details-grid">
                            <div class="sidebar-info">
                                <h3>Year & System</h3>
                                <p>2026 / Anor Core 3.7</p>
                                
                                ${data.tags ? `<h3>Technologies</h3><p>${data.tags}</p>` : ''}
                                
                                ${data.link ? `<h3>Resource</h3><p><a href="${data.link}" target="_blank">View Live / Code</a></p>` : ''}
                            </div>
                            
                            <div class="content-body ai-translate">${data.description}</div>
                        </div>

                        ${data.gallery && data.gallery.length > 0 ? `
                            <div style="margin-top: 100px; display: grid; gap: 40px;">
                                ${data.gallery.map(url => `<img src="${url}" style="width:100%; border-radius:30px;">`).join('')}
                            </div>
                        ` : ''}
                    `;
                } else {
                    document.getElementById('project-container').innerHTML = "<h1 style='text-align:center'>Artifact not found in Spectral database.</h1>";
                }
            });
        }

        // --- FOOTER DATA ---
        onValue(ref(db, 'settings/global'), (snap) => {
            const d = snap.val();
            if(!d) return;
            document.getElementById('f-email').innerText = d.email || '';
            document.getElementById('f-phone').innerText = d.phone || '';
            document.getElementById('f-role').innerText = currentLang === 'ua' ? d.roleUa : d.roleEn;
            
            const socContainer = document.getElementById('f-socials');
            socContainer.innerHTML = '';
            const icons = { tg: 'fa-telegram', gh: 'fa-github', wa: 'fa-whatsapp', ds: 'fa-discord', be: 'fa-behance', fb: 'fa-facebook' };
            
            if(d.socials) {
                for(let key in d.socials) {
                    if(d.socials[key]) {
                        socContainer.innerHTML += `<a href="${d.socials[key]}" target="_blank"><i class="fa-brands ${icons[key]}"></i></a>`;
                    }
                }
            }
        });

        updateLangUI();
    </script>
</body>
</html>
