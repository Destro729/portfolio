<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artifacts | Anor Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --text-secondary: #a1a1a6;
            --accent: #0071e3;
            --card-bg: #121212;
            --border: rgba(255, 255, 255, 0.08);
            --font-hd: 'Unbounded', sans-serif;
            --font-main: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-main); overflow-x: hidden; }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 5%; }

        /* Header */
        header { padding: 40px 0; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: var(--font-hd); font-size: 1.2rem; color: var(--text); text-decoration: none; font-weight: 900; letter-spacing: -1px; }
        
        /* Filter */
        .filter-bar { margin: 40px 0; display: flex; gap: 15px; flex-wrap: wrap; }
        .filter-btn { 
            padding: 10px 20px; border-radius: 30px; border: 1px solid var(--border); 
            background: none; color: var(--text-secondary); cursor: pointer; 
            font-family: var(--font-hd); font-size: 0.65rem; text-transform: uppercase;
        }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* Grid */
        .projects-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 30px; 
            margin-bottom: 100px;
        }

        .project-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
        }

        .project-card:hover { transform: translateY(-10px); }

        .card-img { width: 100%; height: 240px; object-fit: cover; }
        
        .card-content { padding: 30px; }
        .card-meta { font-size: 0.7rem; color: var(--accent); font-family: var(--font-hd); margin-bottom: 10px; display: block; }
        .card-title { font-size: 1.4rem; font-family: var(--font-hd); margin-bottom: 15px; font-weight: 800; }
        .card-desc { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.6; }

        .card-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; }
        .tag { font-size: 0.6rem; background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 6px; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; }

        footer { padding: 60px 0; border-top: 1px solid var(--border); text-align: center; }
        .f-copy { color: var(--text-secondary); font-size: 0.8rem; }

        @media (max-width: 768px) {
            .projects-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <a href="index.html" class="logo" id="footer-logo-text">ANOR</a>
            <div class="lang-switcher">
                <button onclick="setLang('ua')" style="background:none; border:none; color:white; cursor:pointer; font-weight:800;">UA</button>
                <button onclick="setLang('en')" style="background:none; border:none; color:white; cursor:pointer; font-weight:800; margin-left:10px;">EN</button>
            </div>
        </header>

        <h1 style="font-family: var(--font-hd); font-size: 3rem; margin: 40px 0;">ARTIFACTS</h1>

        <div class="filter-bar" id="filter-bar">
            <button class="filter-btn active" onclick="filterProjects('ALL')">ALL</button>
        </div>

        <div class="projects-grid" id="all-projects-grid">
            </div>
    </div>

    <footer>
        <p class="f-copy" id="footer-copy">© 2026 ANOR CORE SYSTEM</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://anor-core-2026-default-rtdb.europe-west1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentLang = localStorage.getItem('anor_lang') || 'ua';
        let allProjects = {};

        function setLang(l) {
            currentLang = l;
            localStorage.setItem('anor_lang', l);
            renderProjects();
        }
        window.setLang = setLang;

        // Завантаження категорій для фільтра
        onValue(ref(db, 'categories'), (snap) => {
            const cats = snap.val();
            const bar = document.getElementById('filter-bar');
            bar.innerHTML = `<button class="filter-btn active" onclick="filterProjects('ALL')">ALL</button>`;
            for(let id in cats) {
                bar.innerHTML += `<button class="filter-btn" onclick="filterProjects('${cats[id].name}')">${cats[id].name}</button>`;
            }
        });

        // Завантаження проектів
        onValue(ref(db, 'projects'), (snap) => {
            allProjects = snap.val() || {};
            renderProjects();
        });

        function renderProjects(filter = 'ALL') {
            const grid = document.getElementById('all-projects-grid');
            grid.innerHTML = "";
            
            for(let id in allProjects) {
                const p = allProjects[id];
                const cats = p.categories || [];
                
                if(filter !== 'ALL' && !cats.includes(filter)) continue;

                const title = p.title.split(' / ')[currentLang === 'ua' ? 0 : 1] || p.title;
                const shortDesc = p.shortDesc.split(' / ')[currentLang === 'ua' ? 0 : 1] || p.shortDesc;

                grid.innerHTML += `
                    <a href="project.html?id=${id}" class="project-card">
                        <img src="${p.mainImage}" class="card-img" alt="${title}">
                        <div class="card-content">
                            <span class="card-meta">${p.customMeta || ''}</span>
                            <h3 class="card-title">${title}</h3>
                            <p class="card-desc">${shortDesc}</p>
                            <div class="card-tags">
                                ${cats.map(c => `<span class="tag">${c}</span>`).join('')}
                            </div>
                        </div>
                    </a>
                `;
            }
        }

        window.filterProjects = (cat) => {
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.toggle('active', b.innerText === cat);
            });
            renderProjects(cat);
        };

        // Footer Data
        onValue(ref(db, 'settings/global'), (snap) => {
            const d = snap.val();
            if(!d) return;
            document.getElementById('footer-logo-text').innerText = d.logoText || "ANOR";
            document.getElementById('footer-copy').innerText = d.copyright || "© 2026";
        });
    </script>
</body>
</html>
