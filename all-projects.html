<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive of Logic | Maksym Rizun</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --text-secondary: #a1a1a6;
            --accent: #0071e3;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --font-hd: 'Unbounded', sans-serif;
            --font-main: 'Inter', sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-main); padding: 80px 8%; }

        /* Навігація — Змінено шлях назад */
        .nav-header {
            position: fixed;
            top: 0; left: 0; width: 100%;
            padding: 20px 8%;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .back-link { 
            color: var(--text); 
            text-decoration: none; 
            font-weight: 800; 
            font-family: var(--font-hd); 
            font-size: 0.8rem;
            display: flex; align-items: center; gap: 10px;
            transition: var(--transition);
        }
        .back-link:hover { color: var(--accent); transform: translateX(-5px); }

        h1 { font-family: var(--font-hd); font-size: clamp(2.5rem, 8vw, 5rem); margin: 40px 0; text-transform: uppercase; }

        /* Фільтри */
        .filters { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 60px; }
        .filter-btn { 
            padding: 14px 28px; border-radius: 100px; border: 1px solid var(--border); 
            background: transparent; color: var(--text-secondary); cursor: pointer; 
            font-weight: 600; text-transform: uppercase; transition: var(--transition);
        }
        .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

        /* Сітка */
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 40px; }
        .project-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 40px; 
            overflow: hidden; transition: var(--transition); display: flex; flex-direction: column;
        }
        .project-card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .project-img { height: 260px; width: 100%; background: #111; overflow: hidden; }
        .project-content { padding: 40px; }
        
        .tag { font-size: 0.65rem; padding: 6px 14px; background: rgba(255,255,255,0.05); color: var(--text-secondary); border-radius: 50px; margin-right: 5px; font-weight: 800; }
        .project-title { font-family: var(--font-hd); font-size: 1.4rem; margin: 15px 0; }
        .project-desc { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 25px; min-height: 50px; }

        .project-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 20px; }
        .like-btn { cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 800; }
        .like-btn.liked { color: #ff3b30; }

        @media (max-width: 600px) { .projects-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header class="nav-header">
        <a href="index.html" class="back-link">
            <i class="fa-solid fa-arrow-left"></i> BACK TO CORE
        </a>
    </header>

    <main>
        <h1>ALL<br>LOGIC</h1>

        <div class="filters">
            <button class="filter-btn active" onclick="filterProjects('all', this)">ALL SYSTEMS</button>
            <button class="filter-btn" onclick="filterProjects('python', this)">PYTHON / AI</button>
            <button class="filter-btn" onclick="filterProjects('uiux', this)">UI/UX DESIGN</button>
        </div>

        <div class="projects-grid" id="projectsGrid">
            
            <div class="project-card" data-category="python">
                <div class="project-img" style="background: linear-gradient(45deg, #0071e3, #000);"></div>
                <div class="project-content">
                    <div class="project-tags"><span class="tag">Automation</span></div>
                    <h3 class="project-title">TikTok Stealth Bot</h3>
                    <p class="project-desc">Human-like interaction engine for social automation.</p>
                    <div class="project-footer">
                        <div class="like-btn" onclick="toggleLike(this)"><i class="fa-regular fa-heart"></i> <span class="count">124</span></div>
                        <a href="projects/tiktok-bot.html" style="color: var(--accent); text-decoration: none; font-weight: 800; font-size: 0.7rem;">DETAILS</a>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        function filterProjects(category, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const cards = document.querySelectorAll('.project-card');
            cards.forEach(card => {
                card.style.display = (category === 'all' || card.dataset.category === category) ? 'flex' : 'none';
            });
        }

        function toggleLike(btn) {
            const icon = btn.querySelector('i');
            const countSpan = btn.querySelector('.count');
            let count = parseInt(countSpan.innerText);
            if (icon.classList.contains('fa-regular')) {
                icon.classList.replace('fa-regular', 'fa-solid');
                btn.classList.add('liked');
                countSpan.innerText = count + 1;
            } else {
                icon.classList.replace('fa-solid', 'fa-regular');
                btn.classList.remove('liked');
                countSpan.innerText = count - 1;
            }
        }
    </script>
</body>
</html>
