<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anor Core | Versailles Admin 3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --sidebar: #0a0a0a;
            --text: #ffffff;
            --text-secondary: #a1a1a6;
            --accent: #0071e3;
            --border: rgba(255, 255, 255, 0.08);
            --card: #121212;
            --input-bg: #000000;
            --font-hd: 'Unbounded', sans-serif;
            --font-main: 'Inter', sans-serif;
            --danger: #ff3b30;
            --success: #34c759;
        }

        body.light-theme {
            --bg: #f5f5f7;
            --sidebar: #ffffff;
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --accent: #0071e3;
            --border: rgba(0, 0, 0, 0.1);
            --card: #ffffff;
            --input-bg: #fbfbfd;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background 0.3s ease, border 0.3s ease;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            padding: 40px 20px;
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .logo {
            font-family: var(--font-hd);
            font-size: 0.8rem;
            color: var(--accent);
            margin-bottom: 50px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nav-group {
            margin-bottom: 30px;
        }

        .nav-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 15px;
            padding-left: 15px;
            display: block;
        }

        .nav-item {
            padding: 14px 18px;
            border-radius: 14px;
            color: var(--text-secondary);
            text-decoration: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 4px;
            border: none;
            background: none;
            width: 100%;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: left;
        }

        .nav-item:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.05);
        }

        body.light-theme .nav-item:hover {
            background: rgba(0, 0, 0, 0.03);
        }

        .nav-item.active {
            background: var(--card);
            color: var(--text);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        /* MAIN CONTENT */
        .main-content {
            margin-left: 280px;
            flex-grow: 1;
            padding: 60px 8%;
            max-width: 1400px;
        }

        h1 {
            font-family: var(--font-hd);
            font-size: 1.8rem;
            margin-bottom: 40px;
            font-weight: 900;
            letter-spacing: -1px;
        }

        /* CARDS & FORMS */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 40px;
            position: relative;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        input, select, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 16px 20px;
            border-radius: 15px;
            color: var(--text);
            font-family: var(--font-main);
            font-size: 0.95rem;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
        }

        textarea {
            resize: vertical;
        }

        /* BUTTONS */
        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-family: var(--font-hd);
            font-size: 0.7rem;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 1px;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-delete {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 10px;
        }

        /* PROJECT LIST */
        .project-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--input-bg);
            border-radius: 18px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }

        .project-info h4 {
            font-family: var(--font-hd);
            font-size: 0.8rem;
            margin-bottom: 4px;
        }

        .project-info span {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* FOOTER SETTINGS SPECIFIC */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .hidden { display: none; }

        /* TOGGLES */
        .admin-controls {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .control-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-right: 5px;
        }

        .control-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

    </style>
</head>
<body class="dark-theme">

    <aside class="sidebar">
        <div class="logo">ANOR CORE SYSTEM 3.0</div>
        
        <div class="nav-group">
            <span class="nav-label">Контент</span>
            <button class="nav-item active" id="btn-projects" onclick="showSection('projects')">
                <i class="fa-solid fa-rocket"></i> Проєкти
            </button>
            <button class="nav-item" id="btn-categories" onclick="showSection('categories')">
                <i class="fa-solid fa-tags"></i> Категорії
            </button>
        </div>

        <div class="nav-group">
            <span class="nav-label">Конфігурація</span>
            <button class="nav-item" id="btn-footer" onclick="showSection('footer')">
                <i class="fa-solid fa-sliders"></i> Глобальні & Футер
            </button>
        </div>

        <div class="admin-controls">
            <div style="margin-bottom: 15px; display: flex; gap: 5px;">
                <button class="control-btn active" id="theme-dark" onclick="setTheme('dark')"><i class="fa-solid fa-moon"></i></button>
                <button class="control-btn" id="theme-light" onclick="setTheme('light')"><i class="fa-solid fa-sun"></i></button>
                <div style="margin-left: auto;">
                    <button class="control-btn active">UA</button>
                    <button class="control-btn">EN</button>
                </div>
            </div>
            <a href="index.html" class="nav-item" style="background: rgba(0,113,227,0.1); color: var(--accent);">
                <i class="fa-solid fa-arrow-up-right-from-square"></i> На сайт
            </a>
        </div>
    </aside>

    <main class="main-content">
        
        <section id="sec-projects">
            <h1>Управління Артефактами</h1>
            <div class="card">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>Назва проєкту (UA)</label>
                        <input type="text" id="p-title" placeholder="Наприклад: TikTok Stealth Bot">
                    </div>
                    
                    <div class="form-group">
                        <label>Мета-тег (над назвою)</label>
                        <input type="text" id="p-meta" placeholder="AUTOMATION, 2026">
                    </div>

                    <div class="form-group">
                        <label>Категорія (Фільтр)</label>
                        <select id="p-cat">
                            </select>
                    </div>

                    <div class="form-group full-width">
                        <label>Теги (через кому для фільтрації: UI/UX, CSS, Python)</label>
                        <input type="text" id="p-tags" placeholder="AI, Scraper, Python">
                    </div>

                    <div class="form-group full-width">
                        <label>Короткий опис (UA)</label>
                        <input type="text" id="p-short" placeholder="Короткий рядок для картки в архіві">
                    </div>

                    <div class="form-group full-width">
                        <label>Повний опис (Логіка Артефакту)</label>
                        <textarea id="p-desc" rows="6" placeholder="Опишіть магію цього коду..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Головне зображення (URL)</label>
                        <input type="text" id="p-img" placeholder="https://imgur.com/...">
                    </div>

                    <div class="form-group">
                        <label>Посилання на результат (GitHub/Demo URL)</label>
                        <input type="text" id="p-link" placeholder="https://github.com/...">
                    </div>

                    <div class="form-group full-width">
                        <label>Галерея (URL-адреси через кому)</label>
                        <textarea id="p-gallery" rows="2" placeholder="url1, url2, url3"></textarea>
                    </div>
                </div>
                
                <button class="btn" onclick="saveProject()">
                    <i class="fa-solid fa-sparkles"></i> Зберегти в Спектраль
                </button>
            </div>

            <div id="project-list-container">
                <label>Існуючі Проєкти</label>
                <div id="project-list"></div>
            </div>
        </section>

        <section id="sec-categories" class="hidden">
            <h1>Матриця Категорій</h1>
            <div class="card">
                <div class="form-group">
                    <label>Нова Категорія</label>
                    <input type="text" id="new-cat-name" placeholder="Наприклад: UI/UX">
                </div>
                <button class="btn" onclick="addCategory()">Додати Категорію</button>
            </div>
            <div id="cat-list" class="card">
                </div>
        </section>

        <section id="sec-footer" class="hidden">
            <h1>Налаштування Футера & Контактів</h1>
            <div class="card">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Контактний Телефон (Жирний текст)</label>
                        <input type="text" id="f-phone" placeholder="+380 93 ...">
                    </div>
                    <div class="form-group">
                        <label>Контактний Email</label>
                        <input type="text" id="f-email" placeholder="example@gmail.com">
                    </div>
                    <div class="form-group">
                        <label>Роль (UA)</label>
                        <input type="text" id="f-role-ua" placeholder="Дизайнер та AI Інженер">
                    </div>
                    <div class="form-group">
                        <label>Роль (EN)</label>
                        <input type="text" id="f-role-en" placeholder="Designer & AI Engineer">
                    </div>

                    <div class="form-group full-width">
                        <label>Соціальні мережі (URL)</label>
                        <div class="social-grid">
                            <input type="text" id="s-tg" placeholder="Telegram URL">
                            <input type="text" id="s-gh" placeholder="GitHub URL">
                            <input type="text" id="s-wa" placeholder="WhatsApp URL">
                            <input type="text" id="s-ds" placeholder="Discord URL">
                            <input type="text" id="s-be" placeholder="Behance URL">
                            <input type="text" id="s-fb" placeholder="Facebook URL">
                        </div>
                    </div>
                </div>
                <button class="btn" onclick="saveFooter()">
                    <i class="fa-solid fa-floppy-disk"></i> Оновити Систему
                </button>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://anor-core-2026-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- UI LOGIC ---
        window.showSection = (name) => {
            document.getElementById('sec-projects').classList.add('hidden');
            document.getElementById('sec-categories').classList.add('hidden');
            document.getElementById('sec-footer').classList.add('hidden');
            
            document.getElementById('sec-' + name).classList.remove('hidden');
            
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + name).classList.add('active');
        };

        window.setTheme = (theme) => {
            if(theme === 'light') {
                document.body.classList.add('light-theme');
                document.getElementById('theme-light').classList.add('active');
                document.getElementById('theme-dark').classList.remove('active');
            } else {
                document.body.classList.remove('light-theme');
                document.getElementById('theme-dark').classList.add('active');
                document.getElementById('theme-light').classList.remove('active');
            }
        };

        // --- CATEGORIES LOGIC ---
        window.addCategory = () => {
            const name = document.getElementById('new-cat-name').value;
            if(!name) return;
            push(ref(db, 'categories'), { name: name.toUpperCase() });
            document.getElementById('new-cat-name').value = "";
        };

        onValue(ref(db, 'categories'), (snap) => {
            const list = document.getElementById('cat-list');
            const select = document.getElementById('p-cat');
            list.innerHTML = "";
            select.innerHTML = "";
            const data = snap.val();
            for(let id in data) {
                list.innerHTML += `
                    <div class="project-item">
                        <span>${data[id].name}</span>
                        <button class="btn-delete" onclick="deleteItem('categories/${id}')"><i class="fa-solid fa-trash"></i></button>
                    </div>`;
                select.innerHTML += `<option value="${data[id].name}">${data[id].name}</option>`;
            }
        });

        // --- PROJECTS LOGIC ---
        window.saveProject = () => {
            const galleryVal = document.getElementById('p-gallery').value;
            const data = {
                title: document.getElementById('p-title').value,
                customMeta: document.getElementById('p-meta').value,
                category: document.getElementById('p-cat').value,
                tags: document.getElementById('p-tags').value,
                shortDesc: document.getElementById('p-short').value,
                description: document.getElementById('p-desc').value,
                mainImage: document.getElementById('p-img').value,
                gallery: galleryVal ? galleryVal.split(',').map(s => s.trim()) : [],
                link: document.getElementById('p-link').value,
                time: Date.now()
            };

            if(!data.title) {
                alert("Назва проєкту обов'язкова!");
                return;
            }

            push(ref(db, 'projects'), data).then(() => {
                alert("Артефакт збережено!");
                // Очистка
                document.querySelectorAll('#sec-projects input, #sec-projects textarea').forEach(i => i.value = "");
            });
        };

        onValue(ref(db, 'projects'), (snap) => {
            const list = document.getElementById('project-list');
            list.innerHTML = "";
            const data = snap.val();
            for(let id in data) {
                list.innerHTML += `
                    <div class="project-item">
                        <div class="project-info">
                            <h4>${data[id].title}</h4>
                            <span>${data[id].category} • ${data[id].tags}</span>
                        </div>
                        <button class="btn-delete" onclick="deleteItem('projects/${id}')"><i class="fa-solid fa-trash"></i></button>
                    </div>`;
            }
        });

        // --- FOOTER LOGIC ---
        window.saveFooter = () => {
            const data = {
                phone: document.getElementById('f-phone').value,
                email: document.getElementById('f-email').value,
                roleUa: document.getElementById('f-role-ua').value,
                roleEn: document.getElementById('f-role-en').value,
                socials: {
                    tg: document.getElementById('s-tg').value,
                    gh: document.getElementById('s-gh').value,
                    wa: document.getElementById('s-wa').value,
                    ds: document.getElementById('s-ds').value,
                    be: document.getElementById('s-be').value,
                    fb: document.getElementById('s-fb').value
                },
                lastUpdate: Date.now()
            };
            set(ref(db, 'settings/global'), data).then(() => alert("Глобальні налаштування оновлено!"));
        };

        // Завантаження даних футера при старті
        onValue(ref(db, 'settings/global'), (snap) => {
            const data = snap.val();
            if(data) {
                document.getElementById('f-phone').value = data.phone || "";
                document.getElementById('f-email').value = data.email || "";
                document.getElementById('f-role-ua').value = data.roleUa || "";
                document.getElementById('f-role-en').value = data.roleEn || "";
                if(data.socials) {
                    document.getElementById('s-tg').value = data.socials.tg || "";
                    document.getElementById('s-gh').value = data.socials.gh || "";
                    document.getElementById('s-wa').value = data.socials.wa || "";
                    document.getElementById('s-ds').value = data.socials.ds || "";
                    document.getElementById('s-be').value = data.socials.be || "";
                    document.getElementById('s-fb').value = data.socials.fb || "";
                }
            }
        });

        window.deleteItem = (path) => {
            if(confirm("Ви впевнені, що хочете видалити цей елемент з історії?")) {
                remove(ref(db, path));
            }
        };

    </script>
</body>
</html>
