<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anor Core | Versailles Admin 3.8 (Elite Edition)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505; --sidebar: #0a0a0a; --text: #ffffff;
            --text-secondary: #a1a1a6; --accent: #0071e3; --border: rgba(255, 255, 255, 0.08);
            --card: #121212; --input-bg: #000000; --font-hd: 'Unbounded', sans-serif;
            --font-main: 'Inter', sans-serif; --danger: #ff3b30; --success: #34c759;
        }
        body.light-theme {
            --bg: #f5f5f7; --sidebar: #ffffff; --text: #1d1d1f;
            --text-secondary: #86868b; --border: rgba(0, 0, 0, 0.1);
            --card: #ffffff; --input-bg: #fbfbfd;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.2s ease; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-main); display: flex; min-height: 100vh; overflow-x: hidden; }
        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 40px 20px; position: fixed; height: 100vh; display: flex; flex-direction: column; z-index: 1000; }
        .logo { font-family: var(--font-hd); font-size: 0.8rem; color: var(--accent); margin-bottom: 50px; letter-spacing: 2px; text-transform: uppercase; }
        .nav-group { margin-bottom: 30px; }
        .nav-label { font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 800; margin-bottom: 15px; padding-left: 15px; display: block; }
        .nav-item { padding: 14px 18px; border-radius: 14px; color: var(--text-secondary); text-decoration: none; cursor: pointer; display: flex; align-items: center; gap: 12px; margin-bottom: 4px; border: none; background: none; width: 100%; font-size: 0.9rem; font-weight: 600; text-align: left; }
        .nav-item:hover, .nav-item.active { color: var(--text); background: rgba(255, 255, 255, 0.05); }
        .main-content { margin-left: 280px; flex-grow: 1; padding: 60px 5%; width: calc(100% - 280px); display: flex; flex-direction: column; align-items: center; }
        section { width: 100%; max-width: 1000px; display: none; }
        section.active { display: block; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; width: 100%; }
        h1 { font-family: var(--font-hd); font-size: 2rem; font-weight: 900; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; width: 100%; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 30px; }
        label { display: block; font-size: 0.75rem; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; margin: 20px 0 8px 5px; }
        input, textarea, select { width: 100%; padding: 16px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: var(--font-main); font-size: 0.95rem; }
        button.btn-primary { width: 100%; padding: 18px; background: var(--accent); color: #fff; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; margin-top: 30px; }
        .footer-settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">Versailles Core 3.8</div>
        <div class="nav-group">
            <span class="nav-label">Керування</span>
            <button class="nav-item active" onclick="showSection('projects')"><i class="fa-solid fa-layer-group"></i> Проекти</button>
            <button class="nav-item" onclick="showSection('footer-section')"><i class="fa-solid fa-shoe-prints"></i> Футер</button>
            <button class="nav-item" onclick="showSection('settings')"><i class="fa-solid fa-gear"></i> Налаштування</button>
        </div>
    </div>

    <div class="main-content">
        <section id="projects" class="active">
            <div class="header-row">
                <h1>Портфоліо</h1>
                <button class="btn-primary" style="width: auto; margin:0; padding: 12px 25px;" onclick="openProjectModal()">+ Новий проект</button>
            </div>
            <div class="grid" id="projects-list"></div>
        </section>

        <section id="footer-section">
            <h1>Налаштування Футера</h1>
            <div class="card" style="margin-top: 30px;">
                <div class="footer-settings-grid">
                    <div>
                        <label>Телефон</label>
                        <input type="text" id="f-phone" placeholder="+380...">
                        <label>Email</label>
                        <input type="text" id="f-email" placeholder="mail@example.com">
                    </div>
                    <div>
                        <label>Роль (UA)</label>
                        <input type="text" id="f-role-ua" placeholder="Дизайнер...">
                        <label>Роль (EN)</label>
                        <input type="text" id="f-role-en" placeholder="Designer...">
                    </div>
                </div>
                <h3 style="margin-top:30px; font-family:var(--font-hd); font-size:1rem;">Соціальні мережі (посилання)</h3>
                <div class="footer-settings-grid">
                    <div>
                        <label>WhatsApp</label><input type="text" id="f-wa">
                        <label>Telegram</label><input type="text" id="f-tg">
                        <label>GitHub</label><input type="text" id="f-gh">
                    </div>
                    <div>
                        <label>Discord</label><input type="text" id="f-ds">
                        <label>Behance</label><input type="text" id="f-bh">
                        <label>Fiverr</label><input type="text" id="f-fv">
                    </div>
                </div>
                <button class="btn-primary" onclick="saveFooter()">Зберегти зміни футера</button>
            </div>
        </section>

        <section id="settings">
            <h1>Налаштування Системи</h1>
            <div class="card" style="margin-top: 30px;">
                <h3 style="font-family:var(--font-hd); font-size:1rem;">Система лайків</h3>
                <label>Множник лайків (на скільки множиться один клік)</label>
                <input type="number" id="like-multiplier" value="1" min="1">
                <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 10px;">
                    * Користувач може поставити лайк і забрати його. Якщо множник > 1, при натисканні додається N лайків, при віджатті - стільки ж забирається.
                </p>
                <button class="btn-primary" onclick="saveGlobalSettings()">Зберегти системні налаштування</button>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDwQpDnT4_o1fiVDKuWI7VAYeal9nh6dRQ",
            authDomain: "anor-core-2026.firebaseapp.com",
            databaseURL: "https://anor-core-2026-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "anor-core-2026",
            storageBucket: "anor-core-2026.firebasestorage.app",
            messagingSenderId: "787691904559",
            appId: "1:787691904559:web:845da19d72ceb9ec50b0da"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Перемикання секцій
        window.showSection = (id) => {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        };

        // Завантаження футера
        onValue(ref(db, 'settings/footer'), (snap) => {
            const f = snap.val();
            if (f) {
                document.getElementById('f-phone').value = f.phone || '';
                document.getElementById('f-email').value = f.email || '';
                document.getElementById('f-role-ua').value = f.roleUa || '';
                document.getElementById('f-role-en').value = f.roleEn || '';
                document.getElementById('f-wa').value = f.wa || '';
                document.getElementById('f-tg').value = f.tg || '';
                document.getElementById('f-gh').value = f.gh || '';
                document.getElementById('f-ds').value = f.ds || '';
                document.getElementById('f-bh').value = f.bh || '';
                document.getElementById('f-fv').value = f.fv || '';
            }
        });

        window.saveFooter = () => {
            const data = {
                phone: document.getElementById('f-phone').value,
                email: document.getElementById('f-email').value,
                roleUa: document.getElementById('f-role-ua').value,
                roleEn: document.getElementById('f-role-en').value,
                wa: document.getElementById('f-wa').value,
                tg: document.getElementById('f-tg').value,
                gh: document.getElementById('f-gh').value,
                ds: document.getElementById('f-ds').value,
                bh: document.getElementById('f-bh').value,
                fv: document.getElementById('f-fv').value
            };
            set(ref(db, 'settings/footer'), data).then(() => alert('Футер оновлено!'));
        };

        // Глобальні налаштування (Лайки)
        onValue(ref(db, 'settings/global'), (snap) => {
            const g = snap.val();
            if (g) document.getElementById('like-multiplier').value = g.likeMultiplier || 1;
        });

        window.saveGlobalSettings = () => {
            const mult = parseInt(document.getElementById('like-multiplier').value) || 1;
            update(ref(db, 'settings/global'), { likeMultiplier: mult }).then(() => alert('Систему оновлено!'));
        };
    </script>
</body>
</html>
